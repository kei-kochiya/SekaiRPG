<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SekaiRPG – Tài liệu kỹ thuật</title>
<style>
:root{
  --bg:#0d0f14;--sidebar:#111520;--panel:#161b27;--border:#252d40;
  --acc:#5eead4;--acc2:#818cf8;--text:#e2e8f0;--muted:#64748b;
  --fn:#f8fafc;--tag:#334155;--warn:#fbbf24;
  font-family:'Segoe UI',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);display:flex;flex-direction:column;height:100vh;overflow:hidden}
/* Header */
header{background:var(--sidebar);border-bottom:1px solid var(--border);
  padding:14px 24px;display:flex;align-items:center;gap:16px;flex-shrink:0}
header h1{font-size:1.1rem;font-weight:700;color:var(--acc);letter-spacing:.04em}
header span{color:var(--muted);font-size:.8rem}
#search{margin-left:auto;background:var(--panel);border:1px solid var(--border);
  color:var(--text);padding:6px 12px;border-radius:6px;font-size:.85rem;width:220px;outline:none}
#search:focus{border-color:var(--acc)}
/* Layout */
.layout{display:flex;flex:1;overflow:hidden}
/* Sidebar */
aside{width:280px;min-width:220px;background:var(--sidebar);border-right:1px solid var(--border);
  overflow-y:auto;flex-shrink:0;padding:12px 0}
/* Tree */
.tree-item{display:flex;align-items:center;gap:6px;padding:4px 12px;
  cursor:pointer;font-size:.82rem;border-radius:0;transition:background .15s;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tree-item:hover{background:rgba(94,234,212,.07)}
.tree-item.active{background:rgba(94,234,212,.12);color:var(--acc)}
.tree-folder{color:var(--acc2);font-weight:600;font-size:.8rem;
  padding:6px 12px;cursor:pointer;display:flex;align-items:center;gap:6px;
  user-select:none;border-radius:0}
.tree-folder:hover{background:rgba(129,140,248,.08)}
.tree-folder .arrow{transition:transform .2s;display:inline-block;font-size:.65rem}
.tree-folder.open .arrow{transform:rotate(90deg)}
.tree-children{display:none;padding-left:14px}
.tree-children.open{display:block}
.icon-folder{color:var(--acc2)}
.icon-file{color:var(--muted);font-size:.75rem}
/* Main panel */
main{flex:1;overflow-y:auto;padding:32px 40px}
.welcome{text-align:center;padding:80px 20px;color:var(--muted)}
.welcome h2{font-size:1.6rem;color:var(--acc);margin-bottom:8px}
/* File doc */
.file-header{margin-bottom:24px}
.file-header h2{font-size:1.4rem;font-weight:700;color:var(--fn);margin-bottom:4px}
.meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.badge{background:var(--tag);color:var(--acc);padding:2px 10px;border-radius:20px;font-size:.75rem}
.badge.ext{color:var(--acc2)}
.docstring{background:var(--panel);border-left:3px solid var(--acc);
  padding:14px 18px;border-radius:0 8px 8px 0;margin:16px 0;
  font-size:.88rem;line-height:1.7;color:#94a3b8;white-space:pre-wrap}
/* Sections */
h3{font-size:.95rem;font-weight:600;color:var(--muted);letter-spacing:.08em;
  text-transform:uppercase;margin:28px 0 12px;border-bottom:1px solid var(--border);padding-bottom:6px}
/* Functions */
.fn-card{background:var(--panel);border:1px solid var(--border);border-radius:8px;
  margin-bottom:10px;overflow:hidden;transition:border-color .2s}
.fn-card:hover{border-color:var(--acc)}
.fn-sig{padding:12px 16px;font-family:monospace;font-size:.85rem;
  display:flex;gap:8px;align-items:baseline;cursor:pointer}
.fn-kw{color:var(--acc2)}
.fn-name{color:var(--acc);font-weight:700}
.fn-params{color:#94a3b8}
.fn-doc{padding:8px 16px 14px;font-size:.82rem;color:#64748b;
  line-height:1.7;border-top:1px solid var(--border);white-space:pre-wrap;display:none}
.fn-card.open .fn-doc{display:block}
/* Variables */
.var-table{width:100%;border-collapse:collapse;font-size:.83rem}
.var-table th{text-align:left;color:var(--muted);font-weight:500;
  padding:6px 12px;border-bottom:1px solid var(--border)}
.var-table td{padding:5px 12px;border-bottom:1px solid rgba(37,45,64,.5)}
.var-table tr:hover td{background:rgba(94,234,212,.04)}
.vname{color:var(--acc);font-family:monospace}
.vtype{color:var(--acc2);font-size:.78rem}
/* Scrollbar */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>
<header>
  <h1>⚔ SekaiRPG</h1>
  <span>Tài liệu kỹ thuật – tự động sinh từ GDScript</span>
  <input id="search" type="search" placeholder="Tìm file...">
</header>
<div class="layout">
  <aside id="sidebar"></aside>
  <main id="main">

      <p>Chọn file ở cây thư mục bên trái để xem tài liệu</p>
    </div>
  </main>
</div>

áng (RES) và tương khắc\nthuộc tính (TypeChart). Đảm bảo sát thương tối thiểu không thấp hơn 5% ATK.", "functions": [], "variables": [{"name": "raw_damage", "type": ""}, {"name": "after_res", "type": ""}, {"name": "multiplier", "type": ""}, {"name": "final_damage", "type": ""}, {"name": "min_damage", "type": ""}]}, {"path": "Scripts/Battle/ProcessStatus.gd", "name": "ProcessStatus.gd", "extends": "Node", "class_name": "ProcessStatus", "docstring": "ProcessStatus: Xử lý các hiệu ứng trạng thái (Status Effects) cho thực thể.\n\nLớp này quản lý các logic gây sát thương theo thời gian (DoT), làm choáng (Stun),\nvà cập nhật thời hạn (duration) của các hiệu ứng đang có trên thực thể vào đầu mỗi lượt.", "functions": [], "variables": [{"name": "can_act", "type": ""}, {"name": "statuses_to_remove", "type": ""}, {"name": "bleed_count", "type": ""}, {"name": "bleed_dmg", "type": ""}, {"name": "pct", "type": ""}, {"name": "dmg", "type": ""}]}, {"path": "Scripts/Battle/TurnCalculator.gd", "name": "TurnCalculator.gd", "extends": "Node", "class_name": "TurnCalculator", "docstring": "TurnCalculator: Tính toán thứ tự hành động (Turn Order) dựa trên đối tượng Entity.\n\nHệ thống này sử dụng khái niệm Action Value (AV) để dự báo danh sách lượt đi \ntrong tương lai. Hỗ trợ cơ chế tie-breaker giúp đan xen lượt ổn định khi \ncác thực thể có cùng tốc độ hoặc trùng tên.", "functions": [], "variables": [{"name": "BASE_VALUE", "type": ""}, {"name": "timeline", "type": ""}, {"name": "av", "type": ""}, {"name": "updated_timeline", "type": ""}]}, {"path": "Scripts/Battle/TypeChart.gd", "name": "TypeChart.gd", "extends": "Node", "class_name": "TypeChart", "docstring": "TypeChart: Bảng tương khắc thuộc tính giữa các hệ trong game.\n\nHệ thuộc tính: Cool, Happy, Cute, Mysterious, Pure.\nQuy tắc: Mạnh hơn x1.25, Yếu hơn x0.8, Bình thường x1.0.", "functions": [], "variables": [{"name": "data", "type": ""}]}, {"path": "Scripts/Core/GameManager.gd", "name": "GameManager.gd", "extends": "Node", "class_name": "", "docstring": "GameManager: Bộ não trung tâm quản lý toàn bộ trạng thái của trò chơi.\n\nLớp này quản lý các thành phần cốt lõi: Đội hình (Party), Hệ thống Save/Load, \nvà Dòng chảy kịch bản (thông qua StoryState). Đảm bảo tính nhất quán của dữ liệu \ngiữa các màn chơi và trạng thái trận đấu.", "functions": [{"name": "_ready", "params": "", "doc": ""}, {"name": "_init_party", "params": "", "doc": "Khởi tạo các đối tượng nhân vật chính và cấp độ ban đầu cho đội hình."}, {"name": "set_flag", "params": "id: String, value: Variant", "doc": "Ghi đè một cờ trạng thái (flag) trong hệ thống StoryState."}, {"name": "get_flag", "params": "id: String, default: Variant = false", "doc": "Lấy giá trị của một cờ trạng thái từ StoryState."}, {"name": "get_party_member", "params": "m_name: String", "doc": "Lấy đối tượng thành viên đội hình theo tên."}, {"name": "start_dialogue", "params": "", "doc": "Bắt đầu trạng thái hội thoại."}, {"name": "end_dialogue", "params": "", "doc": "Kết thúc trạng thái hội thoại."}, {"name": "save_game", "params": "path: String = SAVE_PATH", "doc": "Hàm này thực hiện lưu toàn bộ dữ liệu game vào một đường dẫn cụ thể.\n\t- path: Đường dẫn lưu file (String). Mặc định là SAVE_PATH.\n\t- Return: Không có."}, {"name": "get_current_save_path", "params": "", "doc": "Trả về đường dẫn save mặc định dựa trên bản đồ hiện tại.\n\tVí dụ: 'user://PrologueMap.json'"}, {"name": "load_game", "params": "path: String = SAVE_PATH", "doc": "Hàm này thực hiện nạp dữ liệu từ một file save cụ thể.\n\t- path: Đường dẫn file cần nạp (String). Mặc định là SAVE_PATH.\n\t- Return: True nếu nạp thành công, ngược lại False (bool)."}, {"name": "has_save", "params": "path: String = SAVE_PATH", "doc": "Kiểm tra sự tồn tại của một file save cụ thể."}, {"name": "get_save_files", "params": "", "doc": "Trả về danh sách tất cả các file save (.json) có trong thư mục user://.\n\tDùng để hiển thị danh sách cho người chơi chọn file để load."}, {"name": "reset_game", "params": "", "doc": "Thiết lập lại toàn bộ trạng thái để bắt đầu trò chơi mới."}, {"name": "store_map_state", "params": "map_path: String, player_pos: Vector2", "doc": "Ghi nhớ bản đồ và vị trí hiện tại của người chơi."}, {"name": "reset_mission_stats", "params": "", "doc": "Đặt lại bộ đếm kẻ địch bị hạ gục."}, {"name": "trigger_battle", "params": "", "doc": "Chuyển cảnh đến màn hình chiến đấu."}, {"name": "finish_battle", "params": "victory: bool, count: int = 1", "doc": "Hàm này xử lý các logic sau trận đấu như phân phối EXP và cập nhật cốt truyện.\n\t- victory: Thắng hay thua (bool).\n\t- count: Số lượng địch bị hạ (int).\n\t- Return: Không có."}], "variables": [{"name": "story", "type": "StoryState"}, {"name": "current_map_file", "type": "String"}, {"name": "last_player_position", "type": "Vector2"}, {"name": "is_training_mode", "type": "bool"}, {"name": "training_participants", "type": "Array"}, {"name": "training_used_opponents", "type": "Array"}, {"name": "last_battle_max_lv", "type": "int"}, {"name": "is_in_dialogue", "type": "bool"}, {"name": "is_tutorial", "type": "bool"}, {"name": "is_sandbox", "type": "bool"}, {"name": "is_scripted_battle", "type": "bool"}, {"name": "scripted_battle_id", "type": "String"}, {"name": "sandbox_player_team", "type": "Array"}, {"name": "sandbox_enemy_team", "type": "Array"}, {"name": "party", "type": "Dictionary"}, {"name": "flags", "type": "Dictionary"}, {"name": "warehouse_wave", "type": "int"}, {"name": "harbor_wave", "type": "int"}, {"name": "enemies_defeated", "type": "int"}, {"name": "harbor_guards_defeated", "type": "int"}, {"name": "harbor_route", "type": "String"}, {"name": "prologue_phase", "type": "int"}, {"name": "harbor_mission_done", "type": "bool"}, {"name": "harbor_mission_unlocked", "type": "bool"}, {"name": "intro_quest_done", "type": "bool"}, {"name": "safehouse_intro_done", "type": "bool"}, {"name": "npcs_greeted", "type": "Array"}, {"name": "warehouse_mission_accepted", "type": "bool"}, {"name": "talked_to_mafuyu_training" , "doc": "Khôi phục trạng thái từ dữ liệu đã được nạp (deserialize)."}], "variables": [{"name": "flags", "type": "Dictionary"}, {"name": "warehouse_wave", "type": "int"}, {"name": "harbor_wave", "type": "int"}, {"name": "enemies_defeated", "type": "int"}, {"name": "harbor_guards_defeated", "type": "int"}, {"name": "harbor_route", "type": "String"}]}, {"path": "Scripts/Overworld/InteractableZone.gd", "name": "InteractableZone.gd", "extends": "Area2D", "class_name": "InteractableZone", "docstring": "InteractableZone: Vùng tương tác trong thế giới trò chơi (Overworld).\n\nLớp này quản lý việc phát hiện người chơi khi đi vào vùng kích hoạt, hiển thị\nnhãn gợi ý (prompt) và phát tín hiệu khi người chơi thực hiện thao tác tương tác. \nSử dụng hệ thống Collision Mask để chỉ phản hồi với thực thể người chơi.", "functions": [{"name": "_ready", "params": "", "doc": "Khởi tạo cấu hình cho vùng tương tác và nhãn gợi ý hiển thị.\n\t\n\tThiết lập Collision Layer để không cản trở và Collision Mask để phát hiện \n\tngười chơi (Layer 1). Tạo nhãn gợi ý sử dụng StyleBox từ bộ Assets Kenney."}, {"name": "_on_body_entered", "params": "body", "doc": "Xử lý khi người chơi bước vào vùng tương tác.\n\n\tArgs:\n\t\tbody (Node2D): Đối tượng vừa bước vào vùng."}, {"name": "_on_body_exited", "params": "body", "doc": "Xử lý khi người chơi bước ra khỏi vùng tương tác.\n\n\tArgs:\n\t\tbody (Node2D): Đối tượng vừa bước ra khỏi vùng."}, {"name": "_unhandled_input", "params": "event: InputEvent", "doc": "Xử lý hành động nhấn phím tương tác từ người chơi.\n\n\tĐảm bảo tương tác chỉ xảy ra khi người chơi đang ở trong vùng và không \n\tđang trong trạng thái hội thoại. Sử dụng set_input_as_handled để ngăn \n\tchặn sự kiện phím lan truyền sang các đối tượng khác.\n\n\tArgs:\n\t\tevent (InputEvent): Sự kiện đầu vào từ bàn phím."}, {"name": "_process", "params": "_delta", "doc": "Cập nhật trạng thái hiển thị của nhãn gợi ý theo thời gian thực."}], "variables": [{"name": "prompt_label", "type": "Label"}, {"name": "is_player_inside", "type": "bool"}, {"name": "prompt_text", "type": "String"}, {"name": "pb", "type": ""}]}, {"path": "Scripts/Overworld/OverworldPlayer.gd", "name": "OverworldPlayer.gd", "extends": "CharacterBody2D", "class_name": "OverworldPlayer", "docstring": "OverworldPlayer: Điều khiển nhân vật người chơi trong thế giới khám phá (Overworld).\n\nLớp này quản lý việc di chuyển của nhân vật, hiển thị hình đại diện đồ họa \n(Marker động thay đổi theo hướng đi) và mũi tên chỉ hướng mục tiêu (Objective arrow) \nđể hướng dẫn người chơi thực hiện nhiệm vụ.", "functions": [{"name": "_ready", "params": "", "doc": "Khởi tạo các thành phần cốt lõi của người chơi.\n\t\n\tThiết lập va chạm, Marker đại diện, mũi tên chỉ đường, Hitbox vật lý \n\tvà Camera theo chân. Tự động khôi phục vị trí từ GameManager nếu có."}, {"name": "_process", "params": "_delta", "doc": "Cập nhật logic hình ảnh không liên quan đến vật lý (Mũi tên mục tiêu)."}, {"name": "_update_objective_arrow", "params": "", "doc": "Xác định và chỉ hướng tới mục tiêu nhiệm vụ gần nhất.\n\t\n\tQuét các Node trong nhóm 'objectives', tính toán khoảng cách và xoay \n\tmũi tên hướng về phía đối tượng gần nhất."}, {"name": "_physics_process", "params": "_delta", "doc": "Xử lý di chuyển vật lý và điều khiển đầu vào từ người chơi.\n\n\tNếu đang trong trạng thái hội thoại, vận tốc sẽ được đặt về 0. \n\tMarker của người chơi sẽ tự động chuyển đổi giữa hình tròn (đứng yên) \n\tvà hình mũi tên (di chuyển) dựa trên vector vận tốc."}, {"name": "_draw_dot", "params": "", "doc": "Vẽ hình tròn đơn giản đại diện cho trạng thái đứng yên của người chơi."}, {"name": "_draw_arrow", "params": "dir: Vector2", "doc": "Vẽ hình mũi tên đa giác chỉ hướng di chuyển hiện tại.\n\n\tArgs:\n\t\tdir (Vector2): Vector hướng di chuyển của nhân vật."}], "variables": [{"name": "SPEED", "type": ""}, {"name": "character_color", "type": "Color"}, {"name": "_marker", "type": "Polygon2D"}, {"name": "_objective_arrow", "type": "Sprite2D"}, {"name": "_last_dir", "type": "Vector2"}, {"name": "arrow_tex", "type": ""}, {"name": "shape", "type": ""}, {"name": "rect", "type": ""}, {"name": "camera", "type": ""}, {"name": "objectives", "type": ""}, {"name": "closest", "type": "Node2D"}, {"name": "min_dist", "type": ""}, {"name": "d", "type": ""}, {"name": "dir", "type": ""}, {"name": "input_dir", "type": ""}, {"name": "points", "type": ""}, {"name": "r", "type": ""}, {"name": "sides", "type": ""}, {"name": "angle", "type": ""}, {"name": "norm", "type": ""}, {"name": "perp", "type": ""}, {"name": "tip", "type": ""}, {"name": "base_left", "type": ""}, {"name": "base_right", "type": ""}]}, {"path": "Scripts/Scenario/HarborBattleScript.gd", "name": "HarborBattleScript.gd", "extends": "Node", "class_name": "HarborBattleScript", "docstring": "HarborBattleScript: Quản lý các sự kiện kịch bản trong trận đấu Boss tại Cảng (Harbor).\n\nLớp này xử lý việc triệu hồi viện binh, chuyển đổi các giai đoạn (phase) của Boss,\nhồi sinh Boss, và điều phối các đoạn hội thoại giữa trận đấu để tạo trải nghiệm\nđiện ảnh và thử thách cho người chơi.", "functions": [], "variables": [{"name": "mafuyu", "type": ""}, {"name": "boss", "type": ""}, {"name": "boss", "type": ""}, {"name": "boss_dead", "type": ""}, {"name": "boss", "type": ""}, {"name": "honami", "type": ""}, {"name": "boss", "type": ""}, {"name": "ichika", "type": ""}, {"name": "ena", "type": ""}]}, {"path": "Scripts/Systems/AudioManager.gd", "name": "AudioManager.gd", "extends": "Node", "class_name": "", "docstring": "AudioManager: Hệ thống quản lý âm nhạc nền toàn cục (Autoload).\n\nXử lý việc chuyển đổi giữa các bài nhạc bằng hiệu ứng Fade In/Out.\nKhông phát lại nếu bài hiện tại đang được phát (tránh ngắt mạch).", "functions": [{"name": "_ready", "params": "", "doc": ""}, {"name": "play_music", "params": "track_name: String, fade_duration: float = 1.0", "doc": ""}, {"name": "stop_music", "params": "fade_duration: float = 1.0", "doc": ""}], "variables": [{"name": "_player", "type": "AudioStreamPlayer"}, {"name": "_current_track", "type": "String"}, {"name": "MUSIC_DIR", "type": ""}, {"name": "TRACKS", "type": ""}, {"name": "new_stream", "type": ""}, {"name": "tween", "type": ""}, {"name": "tween", "type": ""}, {"name": "tween", "type": ""}]}, {"path": "Scripts/Systems/DialogueLoader.gd", "name": "DialogueLoader.gd", "extends": "Node", "class_name": "", "docstring": "DialogueLoader: Tải và quản lý dữ liệu hội thoại từ các tệp JSON.\n\nLớp này tự động quét thư mục 'res://Data/storyline/', tải toàn bộ các tệp JSON\nhội thoại và gộp chúng vào một kho lưu trữ tập trung. Nó cung cấp các phương thức\nđể truy xuất danh sách lời thoại dựa trên từ khóa (key) đã được chuẩn hóa.", "functions": [{"name": "_ready", "params": "", "doc": "Khởi tạo loader và thực hiện tải toàn bộ dữ liệu hội thoại vào bộ nhớ."}, {"name": "_load_json", "params": "", "doc": "Quét thư mục chứa hội thoại và tải tuần tự từng tệp JSON tìm thấy."}, {"name": "_load_single_file", "params": "file_path: String", "doc": "Tải một tệp JSON đơn lẻ và gộp nội dung vào bộ nhớ đệm dùng chung.\n\n\tArgs:\n\t\tfile_path (String): Đường dẫn tuyệt đối đến tệp JSON cần nạp."}, {"name": "get_lines", "params": "key: String", "doc": "Lấy danh sách các dòng thoại tương ứng với một khóa (key) chỉ định.\n\n\tDữ liệu trả về được chuẩn hóa thành một mảng các Dictionary chứa:\n\t- type: Loại hội thoại (dialogue/narrator).\n\t- text: Nội dung chữ.\n\t- name: Tên nhân vật hiển thị.\n\t- speaker: Vị trí hiển thị (left/right).\n\t- color: Đối tượng Color đã được chuyển đổi từ mã Hex.\n\n\tArgs:\n\t\tkey (String): Khóa định danh hội thoại trong file JSON.\n\n\tReturns:\n\t\tArray: Mảng các dòng thoại đã chuẩn hóa. Trả về mảng trống nếu không tìm thấy key."}], "variables": [{"name": "_data", "type": "Dictionary"}, {"name": "path", "type": ""}, {"name": "dir", "type": ""}, {"name": "file_name", "type": ""}, {"name": "f", "type": ""}, {"name": "text", "type": ""}, {"name": "parsed", "type": "Variant"}, {"name": "new_data", "type": "Dictionary"}, {"name": "raw", "type": "Array"}, {"name": "out", "type": "Array"}, {"name": "line", "type": "Dictionary"}, {"name": "hex", "type": "String"}]}, {"path": "Scripts/Systems/LevelManager.gd", "name": "LevelManager.gd", "extends": "Node", "class_name": "LevelManager", "docstring": "LevelManager: Quản lý hệ thống cấp độ, kinh nghiệm và thăng tiến sức mạnh.\n\nLớp này xử lý việc tính toán phần thưởng kinh nghiệm, xử lý tiến trình lên cấp,\ntự động nâng cấp chỉ số cho quái vật và áp dụng các giới hạn (Soft/Hard Cap).", "functions": [], "variables": [{"name": "SOFT_CAP_LEVEL", "type": ""}, {"name": "MAX_LEVEL", "type": ""}, {"name": "growth_rate", "type": ""}, {"name": "spd_growth", "type": ""}, {"name": "exp_curve", "type": ""}, {"name": "levels_to_gain", "type": ""}, {"name": "stats", "type": ""}, {"name": "attempts", "type": ""}, {"name": "stat", "type": ""}]}, {"path": "Scripts/Systems/UpgradeManager.gd", "name": "UpgradeManager.gd", "extends": "Node", "class_name": "UpgradeManager", "docstring": "UpgradeManager: Quản lý hệ thống nâng cấp chỉ số vĩnh viễn bằng Skill Points (SP).\n\nLớp này cho phép người chơi hoặc hệ thống tự động phân bổ điểm SP\nvào các chỉ số cơ bản như Máu, Tấn công, Phòng thủ và Tốc độ, đồng thời đảm bảo\ncác chỉ số này không vượt quá giới hạn (Cap) đã định.", "functions": [], "variables": [{"name": "UPGRADE_COST", "type": ""}, {"name": "UPGRADE_AMOUNTS", "type": ""}, {"name": "current_val", "type": ""}, {"name": "cap_val", "type": ""}, {"name": "increment", "type": ""}, {"name": "actual_increment", "type": ""}, {"name": "upgrades_done", "type": ""}]}, {"path": "UI/Battle/ActionGauge.gd", "name": "ActionGauge.gd", "extends": "VBoxContainer", "class_name": "ActionGauge", "docstring": "ActionGauge: Hiển thị danh sách thứ tự hành động (Timeline) trong trận đấu.\n\nThành phần này trực quan hóa danh sách các lượt đánh sắp tới, sử dụng màu sắc \nđể phân biệt giữa phe người chơi và phe địch. Đặc biệt, nó sử dụng cơ chế \nso sánh đối tượng (Object-based) để xác định chính xác danh tính thực thể, \nngay cả khi có các nhân vật trùng tên trên sân.", "functions": [{"name": "_ready", "params": "", "doc": ""}, {"name": "set_player_team", "params": "team: Array", "doc": "Thiết lập danh sách thực thể phe người chơi để phục vụ việc tô màu.\n\n\tArgs:\n\t\tteam (Array): Mảng các thực thể Entity thuộc phe ta."}, {"name": "refresh", "params": "timeline: Array, current_actor: Entity = null", "doc": "Cập nhật và vẽ lại toàn bộ danh sách thứ tự lượt.\n\n\tArgs:\n\t\ttimeline (Array): Mảng các Dictionary chứa thông tin lượt (entity, tick).\n\t\tcurrent_actor (Entity): Thực thể đang thực hiện lượt hiện tại."}], "variables": [{"name": "PLAYER_COLOR", "type": ""}, {"name": "ENEMY_COLOR", "type": ""}, {"name": "player_team", "type": "Array"}, {"name": "header", "type": ""}, {"name": "sep", "type": ""}, {"name": "display_list", "type": ""}, {"name": "data", "type": ""}, {"name": "entity", "type": ""}, {"name": "is_current", "type": ""}, {"name": "entry_name", "type": ""}, {"name": "is_player", "type": ""}, {"name": "row", "type": ""}, {"name": "num", "type": ""}, {"name": "icon", "type": ""}, {"name": "lbl", "type": ""}]}, {"path": "UI/Battle/BattleHUD.gd", "name": "BattleHUD.gd", "extends": "CanvasLayer", "class_name": "", "docstring": "BattleHUD: Lớp điều phối giao diện chính trong trận chiến.\n\nLớp này quản lý việc xây dựng và cập nhật các thành phần UI cốt lõi: \n- Thanh hành động (Action Gauge).\n- Danh sách thẻ nhân vật (Character Cards) phe ta và phe địch.\n- Menu lệnh chiến đấu (Command Menu).\n- Các banner thông báo lượt đi, thắng lợi và thất bại.", "functions": [{"name": "setup", "params": "players: Array, enemies: Array", "doc": "Khởi tạo dữ liệu và xây dựng toàn bộ cây Node giao diện.\n\n\t- players: Danh sách các thực thể phe người chơi (Array).\n\t- enemies: Danh sách các thực thể phe đối phương (Array)."}, {"name": "_build_ui", "params": "", "doc": "Xây dựng cấu trúc giao diện theo bố cục định sẵn.\n\t\n\tBố cục bao gồm: Gauge ở góc trên, thẻ nhân vật hai bên cánh, \n\tvà Menu lệnh được căn giữa phía dưới."}, {"name": "_on_info_pressed", "params": "", "doc": "Mở bảng thông số chi tiết của toàn bộ thực thể trên sân."}, {"name": "show_turn_indicator", "params": "entity: Entity", "doc": "Hiển thị thông báo khi đến lượt của một thực thể cụ thể.\n\n\tArgs:\n\t\tentity (Entity): Thực thể vừa bắt đầu lượt."}, {"name": "show_victory", "params": "", "doc": "Hiển thị banner thông báo chiến thắng."}, {"name": "show_defeat", "params": "", "doc": "Hiển thị banner thông báo thất bại."}, {"name": "_create_banner", "params": "txt: String, color: Color", "doc": "Khởi tạo một dải banner thông báo chuẩn hóa.\n\t\n\tSử dụng texture 'banner_modern' dẹt và cố định kích thước 280x42 \n\tđể đảm bảo tính thẩm mỹ.\n\n\tArgs:\n\t\ttxt (String): Nội dung chữ hiển thị trên banner.\n\t\tcolor (Color): Màu sắc của phông chữ.\n\t\t\n\tReturns:\n\t\tPanelContainer: Đối tượng banner đã được cấu hình."}], "variables": [{"name": "player_team", "type": "Array"}, {"name": "enemy_team", "type": "Array"}, {"name": "ActionGaugeClass", "type": ""}, {"name": "CharacterCardClass", "type": ""}, {"name": "CommandMenuClass", "type": ""}, {"name": "EntityDetailPanelClass", "type": ""}, {"name": "card_container", "type": "VBoxContainer"}, {"name": "enemy_container", "type": "VBoxContainer"}, {"name": "action_gauge", "type": "Node"}, {"name": "command_menu", "type": "Node"}, {"name": "_info_panel", "type": "Node"}, {"name": "card", "type": ""}, {"name": "card", "type": ""}, {"name": "info_btn", "type": ""}, {"name": "banner", "type": ""}, {"name": "tw", "type": ""}, {"name": "banner", "type": ""}, {"name": "tw", "type": ""}, {"name": "banner", "type": ""}, {"name": "tw", "type": ""}, {"name": "p", "type": ""}, {"name": "sb", "type": ""}, {"name": "l", "type": ""}]}, {"path": "UI/Battle/CharacterCard.gd", "name": "CharacterCard.gd", "extends": "PanelContainer", "class_name": "CharacterCard", "docstring": "CharacterCard: Hiển thị thẻ trạng thái của nhân vật hoặc kẻ địch trong trận đấu.\n\nLớp này quản lý việc hiển thị thông tin trực quan cho một thực thể, bao gồm:\n- Ảnh chân dung và Tên (màu sắc phân biệt Ta/Địch).\n- Cấp độ và Thanh HP (tự động cập nhật bằng Tween).\n- Danh sách hiệu ứng trạng thái (Status Dots).\n- Chỉ số hồi chiêu kỹ năng (Cooldown Icons).\nHệ thống sử dụng cơ chế Signal-driven để tự động cập nhật UI khi dữ liệu \ncủa Entity thay đổi.", "functions": [{"name": "setup", "params": "e: Entity, player: bool", "doc": "Khởi tạo và cấu hình dữ liệu cho thẻ thực thể.\n\n\tArgs:\n\t\te (Entity): Thực thể mục tiêu cần hiển thị.\n\t\tplayer (bool): Xác định phe của thực thể (Ta/Địch)."}, {"name": "_build_ui", "params": "", "doc": "Xây dựng cấu trúc cây Node và áp dụng phong cách hình ảnh (Kenney Style)."}, {"name": "_create_header", "params": "", "doc": "Khởi tạo phần đầu thẻ với chân dung, tên và cấp độ."}, {"name": "_create_hp_bar", "params": "", "doc": "Khởi tạo thanh máu với giao diện tùy chỉnh."}, {"name": "_create_cooldown_row", "params": "", "doc": "Khởi tạo hàng biểu tượng theo dõi thời gian hồi kỹ năng."}, {"name": "_connect_signals", "params": "", "doc": "Kết nối các tín hiệu của thực thể để đảm bảo UI cập nhật tự động."}, {"name": "_refresh_all", "params": "", "doc": "Làm mới toàn bộ dữ liệu hiển thị trên thẻ theo trạng thái hiện tại."}, {"name": "_on_level_changed", "params": "lv: int", "doc": "Cập nhật nhãn cấp độ."}, {"name": "_on_hp_changed", "params": "cur: int, m_hp: int", "doc": "Cập nhật giá trị thanh máu với hiệu ứng chuyển động mượt mà."}, {"name": "_on_died", "params": "", "doc": "Xử lý hiệu ứng thị giác khi thực thể bị hạ gục."}, {"name": "_on_cooldown_updated", "params": "skill: String, turns: int", "doc": "Cập nhật thông số hồi chiêu trên từng biểu tượng kỹ năng tương ứng."}, {"name": "_on_status_changed", "params": "statuses: Array", "doc": "Cập nhật danh sách các điểm chỉ báo hiệu ứng trạng thái hiện có."}, {"name": "_on_damag et_flag", "params": "id: String, value: Variant", "doc": "Thiết lập giá trị cho một cờ trạng thái cụ thể."}, {"name": "get_flag", "params": "id: String, default: Variant = false", "doc": "Lấy giá trị của một cờ trạng thái từ bộ nhớ."}, {"name": "reset", "params": "", "doc": "Khôi phục toàn bộ tiến trình và dữ liệu nhiệm vụ về trạng thái mặc định."}, {"name": "serialize", "params": "", "doc": "Chuyển đổi toàn bộ dữ liệu trạng thái sang định dạng Dictionary."}, {"name": "deserialize", "params": "data: Dictionary", "doc": "Khôi phục trạng thái từ dữ liệu đã được nạp (deserialize)."}], "variables": [{"name": "flags", "type": "Dictionary"}, {"name": "warehouse_wave", "type": "int"}, {"name": "harbor_wave", "type": "int"}, {"name": "enemies_defeated", "type": "int"}, {"name": "harbor_guards_defeated", "type": "int"}, {"name": "harbor_route", "type": "String"}]}}, "Overworld": {"InteractableZone.gd": {"path": "Scripts/Overworld/InteractableZone.gd", "name": "InteractableZone.gd", "extends": "Area2D", "class_name": "InteractableZone", "docstring": "InteractableZone: Vùng tương tác trong thế giới trò chơi (Overworld).\n\nLớp này quản lý việc phát hiện người chơi khi đi vào vùng kích hoạt, hiển thị\nnhãn gợi ý (prompt) và phát tín hiệu khi người chơi thực hiện thao tác tương tác. \nSử dụng hệ thống Collision Mask để chỉ phản hồi với thực thể người chơi.", "functions": [{"name": "_ready", "params": "", "doc": "Khởi tạo cấu hình cho vùng tương tác và nhãn gợi ý hiển thị.\n\t\n\tThiết lập Collision Layer để không cản trở và Collision Mask để phát hiện \n\tngười chơi (Layer 1). Tạo nhãn gợi ý sử dụng StyleBox từ bộ Assets Kenney."}, {"name": "_on_body_entered", "params": "body", "doc": "Xử lý khi người chơi bước vào vùng tương tác.\n\n\tArgs:\n\t\tbody (Node2D): Đối tượng vừa bước vào vùng."}, {"name": "_on_body_exited", "params": "body", "doc": "Xử lý khi người chơi bước ra khỏi vùng tương tác.\n\n\tArgs:\n\t\tbody (Node2D): Đối tượng vừa bước ra khỏi vùng."}, {"name": "_unhandled_input", "params": "event: InputEvent", "doc": "Xử lý hành động nhấn phím tương tác từ người chơi.\n\n\tĐảm bảo tương tác chỉ xảy ra khi người chơi đang ở trong vùng và không \n\tđang trong trạng thái hội thoại. Sử dụng set_input_as_handled để ngăn \n\tchặn sự kiện phím lan truyền sang các đối tượng khác.\n\n\tArgs:\n\t\tevent (InputEvent): Sự kiện đầu vào từ bàn phím."}, {"name": "_process", "params": "_delta", "doc": "Cập nhật trạng thái hiển thị của nhãn gợi ý theo thời gian thực."}], "variables": [{"name": "prompt_label", "type": "Label"}, {"name": "is_player_inside", "type": "bool"}, {"name": "prompt_text", "type": "String"}, {"name": "pb", "type": ""}]}, "OverworldPlayer.gd": {"path": "Scripts/Overworld/OverworldPlayer.gd", "name": "OverworldPlayer.gd", "extends": "CharacterBody2D", "class_name": "OverworldPlayer", "docstring": "OverworldPlayer: Điều khiển nhân vật người chơi trong thế giới khám phá (Overworld).\n\nLớp này quản lý việc di chuyển của nhân vật, hiển thị hình đại diện đồ họa \n(Marker động thay đổi theo hướng đi) và mũi tên chỉ hướng mục tiêu (Objective arrow) \nđể hướng dẫn người chơi thực hiện nhiệm vụ.", "functions": [{"name": "_ready", "params": "", "doc": "Khởi tạo các thành phần cốt lõi của người chơi.\n\t\n\tThiết lập va chạm, Marker đại diện, mũi tên chỉ đường, Hitbox vật lý \n\tvà Camera theo chân. Tự động khôi phục vị trí từ GameManager nếu có."}, {"name": "_process", "params": "_delta", "doc": "Cập nhật logic hình ảnh không liên quan đến vật lý (Mũi tên mục tiêu)."}, {"name": "_update_objective_arrow", "params": "", "doc": "Xác định và chỉ hướng tới mục tiêu nhiệm vụ gần nhất.\n\t\n\tQuét các Node trong nhóm 'objectives', tính toán khoảng cách và xoay \n\tmũi tên hướng về phía đối tượng gần nhất."}, {"name": "_physics_process", "params": "_delta", "doc": "Xử lý di chuyển vật lý và điều khiển đầu vào từ người chơi.\n\n\tNếu đang trong trạng thái hội thoại, vận tốc sẽ được đặt về 0. \n\tMarker của người chơi sẽ tự động chuyển đổi giữa hình tròn (đứng yên) \n\tvà hình mũi tên (di chuyển) dựa trên vector vận tốc."}, {"name": "_draw_dot", "params": "", "doc": "Vẽ hình tròn đơn giản đại diện cho trạng thái đứng yên của người chơi."}, {"name": "_draw_arrow", "params": "dir: Vector2", "doc": "Vẽ hình mũi tên đa giác chỉ hướng di chuyển hiện tại.\n\n\tArgs:\n\t\tdir (Vector2): Vector hướng di chuyển của nhân vật."}], "variables": [{"name": "SPEED", "type": ""}, {"name": "character_color", "type": "Color"}, {"name": "_marker", "type": "Polygon2D"}, {"name": "_objective_arrow", "type": "Sprite2D"}, {"name": "_last_dir", "type": "Vector2"}, {"name": "arrow_tex", "type": ""}, {"name": "shape", "type": ""}, {"name": "rect", "type": ""}, {"name": "camera", "type": ""}, {"name": "objectives", "type": ""}, {"name": "closest", "type": "Node2D"}, {"name": "min_dist", "type": ""}, {"name": "d", "type": ""}, {"name": "dir", "type": ""}, {"name": "input_dir", "type": ""}, {"name": "points", "type": ""}, {"name": "r", "type": ""}, {"name": "sides", "type": ""}, {"name": "angle", "type": ""}, {"name": "norm", "type": ""}, {"name": "perp", "type": ""}, {"name": "tip", "type": ""}, {"name": "base_left", "type": ""}, {"name": "base_right", "type": ""}]}}, "Scenario": {"HarborBattleScript.gd": {"path": "Scripts/Scenario/HarborBattleScript.gd", "name": "HarborBattleScript.gd", "extends": "Node", "class_name": "HarborBattleScript", "docstring": "HarborBattleScript: Quản lý các sự kiện kịch bản trong trận đấu Boss tại Cảng (Harbor).\n\nLớp này xử lý việc triệu hồi viện binh, chuyển đổi các giai đoạn (phase) của Boss,\nhồi sinh Boss, và điều phối các đoạn hội thoại giữa trận đấu để tạo trải nghiệm\nđiện ảnh và thử thách cho người chơi.", "functions": [], "variables": [{"name": "mafuyu", "type": ""}, {"name": "boss", "type": ""}, {"name": "boss", "type": ""}, {"name": "boss_dead", "type": ""}, {"name": "boss", "type": ""}, {"name": "honami", "type": ""}, {"name": "boss", "type": ""}, {"name": "ichika", "type": ""}, {"name": "ena", "type": ""}]}}, "Systems": {"AudioManager.gd": {"path": "Scripts/Systems/AudioManager.gd", "name": "AudioManager.gd", "extends": "Node", "class_name": "", "docstring": "AudioManager: Hệ thống quản lý âm nhạc nền toàn cục (Autoload).\n\nXử lý việc chuyển đổi giữa các bài nhạc bằng hiệu ứng Fade In/Out.\nKhông phát lại nếu bài hiện tại đang được phát (tránh ngắt mạch).", "functions": [{"name": "_ready", "params": "", "doc": ""}, {"name": "play_music", "params": "track_name: String, fade_duration: float = 1.0", "doc": ""}, {"name": "stop_music", "params": "fade_duration: float = 1.0", "doc": ""}], "variables": [{"name": "_player", "type": "AudioStreamPlayer"}, {"name": "_current_track", "type": "String"}, {"name": "MUSIC_DIR", "type": ""}, {"name": "TRACKS", "type": ""}, {"name": "new_stream", "type": ""}, {"name": "tween", "type": ""}, {"name": "tween", "type": ""}, {"name": "tween", "type": ""}]}, "DialogueLoader.gd": {"path": "Scripts/Systems/DialogueLoader.gd", "name": "DialogueLoader.gd", "extends": "Node", "class_name": "", "docstring": "DialogueLoader: Tải và quản lý dữ liệu hội thoại từ các tệp JSON.\n\nLớp này tự động quét thư mục 'res://Data/storyline/', tải toàn bộ các tệp JSON\nhội thoại và gộp chúng vào một kho lưu trữ tập trung. Nó cung cấp các phương thức\nđể truy xuất danh sách lời thoại dựa trên từ khóa (key) đã được chuẩn hóa.", "functions": [{"name": "_ready", "params": "", "doc": "Khởi tạo loader và thực hiện tải toàn bộ dữ liệu hội thoại vào bộ nhớ."}, {"name": "_load_json", "params": "", "doc": "Quét thư mục chứa hội thoại và tải tuần tự từng tệp JSON tìm thấy."}, {"name": "_load_single_file", "params": "file_path: String", "doc": "Tải một tệp JSON đơn lẻ và gộp nội dung vào bộ nhớ đệm dùng chung.\n\n\tArgs:\n\t\tfile_path (String): Đường dẫn tuyệt đối đến tệp JSON cần nạp."}, {"name": "get_lines", "params": "key: String", "doc": "Lấy danh sách các dòng thoại tương ứng với một khóa (key) chỉ định.\n\n\tDữ liệu trả về được chuẩn hóa thành một mảng các Dictionary chứa:\n\t- type: Loại hội thoại (dialogue/narrator).\n\t- text: Nội dung chữ.\n\t- name: Tên nhân vật hiển thị.\n\t- speaker: Vị trí hiển thị (left/right).\n\t- color: Đối tượng Color đã được chuyển đổi từ mã Hex.\n\n\tArgs:\n\t\tkey (String): Khóa định danh hội thoại trong file JSON.\n\n\tReturns:\n\t\tArray: Mảng các dòng thoại đã chuẩn hóa. Trả về mảng trống nếu không tìm thấy key."}], "variables": [{"name": "_data", "type": "Dictionary"}, {"name": "path", "type": ""}, {"name": "dir", "type": ""}, {"name": "file_name", "type": ""}, {"name": "f", "type": ""}, {"name": "text", "type": ""}, {"name": "parsed", "type": "Variant"}, {"name": "new_data", "type": "Dictionary"}, {"name": "raw", "type": "Array"}, {"name": "out", "type": "Array"}, {"name": "line", "type": "Dictionary"}, {"name": "hex", "type": "String"}]}, "LevelManager.gd": {"path": "Scripts/Systems/LevelManager.gd", "name": "LevelManager.gd", "extends": "Node", "class_name": "LevelManager", "docstring": "LevelManager: Quản lý hệ thống cấp độ, kinh nghiệm và thăng tiến sức mạnh.\n\nLớp này xử lý việc tính toán phần thưởng kinh nghiệm, xử lý tiến trình lên cấp,\ntự động nâng cấp chỉ số cho quái vật và áp dụng các giới hạn (Soft/Hard Cap).", "functions": [], "variables": [{"name": "SOFT_CAP_LEVEL", "type": ""}, {"name": "MAX_LEVEL", "type": ""}, {"name": "growth_rate", "type": ""}, {"name": "spd_growth", "type": ""}, {"name": "exp_curve", "type": ""}, {"name": "levels_to_gain", "type": ""}, {"name": "stats", "type": ""}, {"name": "attempts", "type": ""}, {"name": "stat", "type": ""}]}, "UpgradeManager.gd": {"path": "Scripts/Systems/UpgradeManager.gd", "name": "UpgradeManager.gd", "extends": "Node", "class_name": "UpgradeManager", "docstring": "UpgradeManager: Quản lý hệ thống nâng cấp chỉ số vĩnh viễn bằng Skill Points (SP).\n\nLớp này cho phép người chơi hoặc hệ thống tự động phân bổ điểm SP\nvào các chỉ số cơ bản như Máu, Tấn công, Phòng thủ và Tốc độ, đồng thời đảm bảo\ncác chỉ số này k "name": "BattleHUD.gd", "extends": "CanvasLayer", "class_name": "", "docstring": "BattleHUD: Lớp điều phối giao diện chính trong trận chiến.\n\nLớp này quản lý việc xây dựng và cập nhật các thành phần UI cốt lõi: \n- Thanh hành động (Action Gauge).\n- Danh sách thẻ nhân vật (Character Cards) phe ta và phe địch.\n- Menu lệnh chiến đấu (Command Menu).\n- Các banner thông báo lượt đi, thắng lợi và thất bại.", "functions": [{"name": "setup", "params": "players: Array, enemies: Array", "doc": "Khởi tạo dữ liệu và xây dựng toàn bộ cây Node giao diện.\n\n\t- players: Danh sách các thực thể phe người chơi (Array).\n\t- enemies: Danh sách các thực thể phe đối phương (Array)."}, {"name": "_build_ui", "params": "", "doc": "Xây dựng cấu trúc giao diện theo bố cục định sẵn.\n\t\n\tBố cục bao gồm: Gauge ở góc trên, thẻ nhân vật hai bên cánh, \n\tvà Menu lệnh được căn giữa phía dưới."}, {"name": "_on_info_pressed", "params": "", "doc": "Mở bảng thông số chi tiết của toàn bộ thực thể trên sân."}, {"name": "show_turn_indicator", "params": "entity: Entity", "doc": "Hiển thị thông báo khi đến lượt của một thực thể cụ thể.\n\n\tArgs:\n\t\tentity (Entity): Thực thể vừa bắt đầu lượt."}, {"name": "show_victory", "params": "", "doc": "Hiển thị banner thông báo chiến thắng."}, {"name": "show_defeat", "params": "", "doc": "Hiển thị banner thông báo thất bại."}, {"name": "_create_banner", "params": "txt: String, color: Color", "doc": "Khởi tạo một dải banner thông báo chuẩn hóa.\n\t\n\tSử dụng texture 'banner_modern' dẹt và cố định kích thước 280x42 \n\tđể đảm bảo tính thẩm mỹ.\n\n\tArgs:\n\t\ttxt (String): Nội dung chữ hiển thị trên banner.\n\t\tcolor (Color): Màu sắc của phông chữ.\n\t\t\n\tReturns:\n\t\tPanelContainer: Đối tượng banner đã được cấu hình."}], "variables": [{"name": "player_team", "type": "Array"}, {"name": "enemy_team", "type": "Array"}, {"name": "ActionGaugeClass", "type": ""}, {"name": "CharacterCardClass", "type": ""}, {"name": "CommandMenuClass", "type": ""}, {"name": "E // Build sidebar tree
const aside = document.getElementById('sidebar');
function buildTree(node, parent, depth=0){
  for(const [key, val] of Object.entries(node)){
    if(val.path){
      // leaf = file
      const el = document.createElement('div');
      el.className='tree-item';
      el.style.paddingLeft=(12+depth*14)+'px';
      el.innerHTML=`<span class="icon-file">📄</span> ${key}`;
      el.dataset.path = val.path;
      el.onclick=()=>showFile(val, el);
      parent.appendChild(el);
    } else {
      // folder
      const folder = document.createElement('div');
      folder.className='tree-folder';
      folder.style.paddingLeft=(12+depth*14)+'px';
      folder.innerHTML=`<span class="arrow">▶</span><span class="icon-folder">📁</span> ${key}`;
      parent.appendChild(folder);
      const children = document.createElement('div');
      children.className='tree-children';
      parent.appendChild(children);
      buildTree(val, children, depth+1);
      folder.onclick=()=>{
        folder.classList.toggle('open');
        children.classList.toggle('open');
      };
    }
  }
}
buildTree(DATA.tree, aside);

// Show file details
let activeEl = null;
function showFile(f, el){
  if(activeEl){ activeEl.classList.remove('active'); }
  el.classList.add('active');
  activeEl = el;

  const main = document.getElementById('main');
  const path = f.path;
  const vars = (f.variables||[]).filter(v=>!v.name.startsWith('_'));
  const fns  = f.functions||[];

  let html = `<div class="file-header">
    <h2>📄 ${f.name}</h2>
    <div style="color:var(--muted);font-size:.8rem;margin-top:2px">${path}</div>
    <div class="meta">`;
  if(f.class_name) html+=`<span class="badge">${f.class_name}</span>`;
  if(f.extends)    html+=`<span class="badge ext">extends ${f.extends}</span>`;
  html+=`</div></div>`;

  if(f.docstring) html+=`<div class="docstring">${esc(f.docstring)}</div>`;

  if(vars.length){
    html+=`<h3>Thuộc tính (${vars.length})</h3>
    <table class="var-table"><thead><tr><th>Tên</th><th>Kiểu</th></tr></thead><tbody>`;
    vars.forEach(v=>{
      html+=`<tr><td class="vname">${esc(v.name)}</td><td class="vtype">${esc(v.type)}</td></tr>`;
    });
    html+=`</tbody></table>`;
  }

  if(fns.length){
    html+=`<h3>Hàm (${fns.length})</h3>`;
    fns.forEach((fn,i)=>{
      const id=`fn${i}`;
      html+=`<div class="fn-card" id="${id}">
        <div class="fn-sig" onclick="toggle('${id}')">
          <span class="fn-kw">func</span>
          <span class="fn-name">${esc(fn.name)}</span>
          <span class="fn-params">(${esc(fn.params)})</span>
        </div>`;
      if(fn.doc) html+=`<div class="fn-doc">${esc(fn.doc)}</div>`;
      html+=`</div>`;
    });
  }

  main.innerHTML = html;
}

function toggle(id){
  document.getElementById(id).classList.toggle('open');
}

function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// Search
document.getElementById('search').addEventListener('input', function(){
  const q = this.value.toLowerCase();
  document.querySelectorAll('.tree-item').forEach(el=>{
    const match = el.dataset.path.toLowerCase().includes(q);
    el.style.display = match ? '' : 'none';
  });
  // Auto-open folders that have visible children
  document.querySelectorAll('.tree-children').forEach(ch=>{
    const hasVisible = [...ch.querySelectorAll('.tree-item')].some(e=>e.style.display!=='none');
    const folder = ch.previousElementSibling;
    if(hasVisible){ ch.classList.add('open'); folder && folder.classList.add('open'); }
    else { ch.classList.remove('open'); folder && folder.classList.remove('open'); }
  });
});
